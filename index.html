<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orvia Tech — Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #060616;
      color: #fff;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 750px; height: 750px; background: #6d28d9; opacity: 0.32; top: -260px; left: -180px; animation: f1 13s ease-in-out infinite alternate; }
    .orb2 { width: 620px; height: 620px; background: #0e7490; opacity: 0.26; bottom: -220px; right: -160px; animation: f2 15s ease-in-out infinite alternate; }
    .orb3 { width: 420px; height: 420px; background: #4338ca; opacity: 0.2; top: 35%; left: 38%; animation: f1 11s 4s ease-in-out infinite alternate; }
    @keyframes f1 { to { transform: translate(50px, 45px); } }
    @keyframes f2 { to { transform: translate(-50px, -45px); } }

    .dotgrid {
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 36px 36px;
    }

    /* particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: particleFloat linear infinite;
      opacity: 0;
    }
    @keyframes particleFloat {
      0%   { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      50%  { transform: translateY(50vh) translateX(30px) scale(1); }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-10vh) translateX(-20px) scale(0.5); opacity: 0; }
    }

    /* lightning */
    .lightning-wrap {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 100vh;
      pointer-events: none;
      z-index: 0;
    }
    .lightning-wrap svg {
      width: 100%; height: 100%;
      overflow: visible;
    }

    /* pulse rings */
    .ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.15);
      pointer-events: none;
      z-index: 0;
      animation: ringPulse ease-out infinite;
      opacity: 0;
    }
    @keyframes ringPulse {
      0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 0.6; }
      100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; }
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 32px 56px;
      display: flex;
      align-items: center;
      opacity: 0;
      animation: fadeIn 0.6s 0.1s ease forwards;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
    }

    .logo-info { display: flex; flex-direction: column; gap: 3px; }
    .logo-info .name {
      font-family: 'Inter', sans-serif;
      font-size: 23px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0px;
      line-height: 1;
    }
    .logo-info .name span {
      background: linear-gradient(90deg, #a78bfa, #22d3ee, #a78bfa);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: techShimmer 2.5s linear infinite;
    }
    @keyframes techShimmer {
      0%   { background-position: 0%; }
      100% { background-position: 200%; }
    }
    .logo-info .tag {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      line-height: 1;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 130px 24px 90px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(109,40,217,0.14);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 100px;
      padding: 9px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #c4b5fd;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.7s 0.3s ease forwards;
    }
    .pill-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a78bfa;
      box-shadow: 0 0 6px #a78bfa, 0 0 14px rgba(167,139,250,0.5);
      animation: blink 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.12; } }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 5.5vw, 72px);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -1.5px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.85s 0.45s ease forwards;
    }
    h1 .w { display: block; color: #f1f0ff; }
    h1 .g {
      display: block;
      background: linear-gradient(110deg, #a78bfa 0%, #22d3ee 55%, #818cf8 100%);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 5s linear infinite;
    }
    @keyframes shimmer { 0%{ background-position:0%; } 100%{ background-position:200%; } }

    .sub {
      font-family: 'Inter', sans-serif;
      font-size: 16.5px;
      font-weight: 400;
      color: rgba(255,255,255,0.38);
      max-width: 450px;
      line-height: 1.9;
      margin-bottom: 54px;
      opacity: 0;
      animation: fadeUp 0.85s 0.6s ease forwards;
    }

    .form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.85s 0.75s ease forwards;
    }
    .form input {
      width: 290px;
      padding: 15px 26px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(14px);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }
    .form input::placeholder { color: rgba(255,255,255,0.22); }
    .form input:focus {
      border-color: rgba(167,139,250,0.5);
      background: rgba(109,40,217,0.1);
    }
    .form button {
      padding: 15px 34px;
      border-radius: 100px;
      border: none;
      background: linear-gradient(135deg, #7c3aed 0%, #1d4ed8 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.2px;
      box-shadow: 0 0 0 1px rgba(124,58,237,0.22), 0 6px 28px rgba(124,58,237,0.42);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .form button:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 0 1px rgba(124,58,237,0.4), 0 14px 44px rgba(124,58,237,0.62);
    }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 22px;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.14);
      letter-spacing: 0.2px;
      opacity: 0;
      animation: fadeIn 0.6s 1.1s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 520px) {
      nav { padding: 22px 22px; }
      h1  { letter-spacing: -1px; }
      .sub { font-size: 15px; }
      .form input  { width: 100%; max-width: 310px; }
      .form button { width: 100%; max-width: 310px; }
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="dotgrid"></div>

  <!-- Lightning SVG container -->
  <div class="lightning-wrap">
    <svg id="boltSvg" viewBox="0 0 300 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:0;">
      <defs>
        <filter id="boltGlow" x="-50%" y="-10%" width="200%" height="120%">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
          <stop offset="15%"  stop-color="#e9d5ff" stop-opacity="1"/>
          <stop offset="45%"  stop-color="#ffffff" stop-opacity="1"/>
          <stop offset="75%"  stop-color="#22d3ee" stop-opacity="1"/>
          <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path id="boltGlowPath" fill="none" stroke="url(#boltGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#boltGlow)" opacity="0.45"/>
      <path id="boltCorePath" fill="none" stroke="url(#boltGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <script>
    const colors = ['#a78bfa','#22d3ee','#818cf8','#c084fc','#38bdf8','#6d28d9'];

    // Floating particles
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 1.5;
      const color = colors[Math.floor(Math.random() * colors.length)];
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}vw;
        background:${color};
        box-shadow:0 0 ${size*4}px ${color}, 0 0 ${size*8}px ${color};
        animation-duration:${Math.random()*14+7}s;
        animation-delay:${Math.random()*12}s;
      `;
      document.body.appendChild(p);
    }

    // Pulse rings
    for (let i = 0; i < 3; i++) {
      const r = document.createElement('div');
      r.className = 'ring';
      const size = Math.random() * 200 + 150;
      r.style.cssText = `
        width:${size}px; height:${size}px;
        top:${30+Math.random()*40}vh;
        left:${20+Math.random()*60}vw;
        animation-duration:${Math.random()*3+4}s;
        animation-delay:${Math.random()*5}s;
      `;
      document.body.appendChild(r);
    }

    // ── LIGHTNING ──
    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function generateBoltPath() {
      const steps = 16;
      // start from top-left corner area
      let x = randomBetween(0, 60);
      let y = 0;
      let d = `M ${x} ${y}`;
      const stepH = 800 / steps;

      for (let i = 1; i <= steps; i++) {
        // drift towards right as it goes down (diagonal feel)
        const drift = randomBetween(15, 50);
        const jag = randomBetween(20, 70) * (Math.random() > 0.45 ? 1 : -1);
        x = Math.min(290, Math.max(10, x + drift + jag));
        y = i * stepH;

        // micro branch
        if (Math.random() > 0.55) {
          const mx = x + randomBetween(15, 40) * (Math.random() > 0.5 ? 1 : -1);
          const my = y - stepH * 0.35;
          d += ` L ${mx} ${my}`;
        }
        d += ` L ${x} ${y}`;
      }
      return d;
    }

    function flashBolt() {
      const path = generateBoltPath();
      const glow = document.getElementById('boltGlowPath');
      const core = document.getElementById('boltCorePath');
      glow.setAttribute('d', path);
      core.setAttribute('d', path);

      const wrap = document.querySelector('.lightning-wrap');

      // flicker sequence: on → dim → on → off
      wrap.style.opacity = '1';
      setTimeout(() => { wrap.style.opacity = '0.15'; }, 80);
      setTimeout(() => { wrap.style.opacity = '1'; },   140);
      setTimeout(() => { wrap.style.opacity = '0.4'; },  200);
      setTimeout(() => { wrap.style.opacity = '0'; },    320);

      // schedule next strike randomly between 3–7s
      setTimeout(flashBolt, randomBetween(3000, 7000));
    }

    // first strike after 1.5s
    setTimeout(flashBolt, 1500);
  </script>

  <nav>
    <a class="logo" href="#">
      <div class="logo-info">
        <div class="name">Orvia <span>Tech</span></div>
        <div class="tag">Innovation Redefined</div>
      </div>
    </a>
  </nav>

  <main>
    <div class="pill">
      <span class="pill-dot"></span>
      Coming Soon
    </div>

    <h1>
      <span class="w">We're Building</span>
      <span class="g">The Future.</span>
    </h1>

    <p class="sub">
      Orvia Tech is crafting something extraordinary. A powerful new experience is almost ready — be the first to know when we go live.
    </p>


  </main>

  <footer>© 2025 Orvia Tech &nbsp;·&nbsp; All rights reserved.</footer>

</body>
</html>
